<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>
<link rel="stylesheet" href="style.css">

<style>
* { box-sizing: border-box; }

.section {
    margin-bottom: 20px;
    text-align: left;
}

.section h3 {
    margin-bottom: 8px;
    color: #0077aa;
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 10px;
}

.info-box {
    background: #f5fbff;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
}

.detail-box {
    background: #ffffff;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    border-left: 5px solid #00aaff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.fade {
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">

    <div class="logo" ondblclick="adminAccess()">
      <img src="logo.jpeg">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="app.html?view=services">Services</a>
      <a href="auth.html">Login</a>
    </div>

  </div>
</nav>

<div class="page">
<div class="card fade" id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const view = params.get("view");
const content = document.getElementById("content");

/* PRICE FUNCTION */
function getPrice(size){
    if(size === "5 Gallons") return 50;
    if(size === "10 Gallons") return 60;
    if(size === "15 Gallons") return 70;
    return 0;
}

/* MAIN SERVICES */
if(view === "services"){
content.innerHTML = `
<h2>Our Services</h2>

<div class="grid">

<div class="service-card">
<img src="refill.jpeg">
<h3>Water Refill</h3>
<button class="primary" onclick="orderNow('refill')">Order Now</button>
<button class="secondary" onclick="viewDetails('refill')">View Details</button>
</div>

<div class="service-card">
<img src="deliver.jpeg">
<h3>Delivery</h3>
<button class="secondary" onclick="viewDetails('delivery')">View Details</button>
</div>

<div class="service-card">
<img src="bottle.jpeg">
<h3>Containers</h3>
<button class="primary" onclick="orderNow('container')">Order Now</button>
<button class="secondary" onclick="viewDetails('container')">View Details</button>
</div>

</div>
`;
}

/* VIEW DETAILS (UNCHANGED) */
function viewDetails(type){

if(type === "refill"){
content.innerHTML = `
<h2>💧 Water Refill Service</h2>

<div class="section">
<div class="detail-box">
Clean, purified drinking water processed through multi-stage filtration to ensure safety and quality.
</div>
</div>

<div class="section">
<h3>💰 Pricing</h3>
<div class="detail-box">
5 Gallons - ₱50 <br>
10 Gallons - ₱60 <br>
15 Gallons - ₱70
</div>
</div>

<button class="secondary" onclick="goBack()">Back</button>
`;
}

if(type === "container"){
content.innerHTML = `<h2>🧴 Water Containers</h2>
<button class="secondary" onclick="goBack()">Back</button>`;
}

if(type === "delivery"){
content.innerHTML = `<h2>🚚 Delivery Service</h2>
<button class="secondary" onclick="goBack()">Back</button>`;
}

}

/* ORDER FORM */
function orderNow(type){

content.innerHTML = `
<h2>Order - ${type}</h2>

<input placeholder="Full Name" id="name">
<input placeholder="Address" id="address">
<input placeholder="Contact Number" id="phone">

<label><b>Size (ORDER HERE)</b></label>
<select id="size" onchange="computeTotal()">
<option value="">Select Size</option>
<option>5 Gallons - ₱50</option>
<option>10 Gallons - ₱60</option>
<option>15 Gallons - ₱70</option>
</select>

<input type="number" placeholder="Quantity" id="qty" oninput="computeTotal()">
<input type="date" id="date">

<div id="totalDisplay" style="margin-top:10px; font-weight:bold; color:#0077aa;">
Total: ₱0
</div>

<button class="primary" onclick="submitOrder('${type}')">Submit Order</button>
<button class="secondary" onclick="goBack()">Back</button>
`;

}

/* COMPUTE TOTAL */
function computeTotal(){
let sizeText = document.getElementById("size").value;
let qty = parseInt(document.getElementById("qty").value) || 0;

let size = sizeText.split(" - ")[0];
let price = getPrice(size);
let total = price * qty;

document.getElementById("totalDisplay").innerText =
"Total: ₱" + total;
}

/* SUBMIT ORDER */
function submitOrder(type){

if(!localStorage.getItem("session")){
location="auth.html";
return;
}

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let phone = document.getElementById("phone").value;

let sizeText = document.getElementById("size").value;
let size = sizeText.split(" - ")[0];

let qty = document.getElementById("qty").value;
let date = document.getElementById("date").value;

let price = getPrice(size);
let total = price * qty;

let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
user: localStorage.getItem("session"),
service: type,
name,
address,
phone,
size,
qty,
price,
total,
date,
status: "Pending"
});

localStorage.setItem("orders", JSON.stringify(orders));

content.innerHTML = `
<div class="fade">

<h2>🎉 Thank You for Your Order!</h2>

<div class="info-grid">
<div class="info-box">Service: ${type}</div>
<div class="info-box">Name: ${name}</div>
<div class="info-box">Size: ${size}</div>
<div class="info-box">Qty: ${qty}</div>
<div class="info-box">Price: ₱${price}</div>
<div class="info-box">Total: ₱${total}</div>
</div>

<button class="primary" onclick="goBack()">Back</button>

</div>
`;
}

/* BACK */
function goBack(){
location="app.html?view=services";
}

/* ADMIN */
function adminAccess(){
let pass = prompt("Enter admin password:");
if(pass === "1234"){
localStorage.setItem("session","admin");
location = "admin.html";
}else{
alert("Access denied");
}
}
</script>

<footer style="text-align: center; padding: 15px; margin-top: 20px; background-color: #f1f1f1;">
  <p>© 2026 CJ's Water Station. All rights reserved.</p>
</footer>

</body>
</html>
